name: Docker


on:
 workflow_dispatch:


jobs:
  build:
   runs-on: ubuntu-latest
   
   steps:
      - name: checkout Code repo
        uses: actions/checkout@v4

  deploy:
   needs: build
   runs-on: ubuntu-latest

   steps:
      - name: create docker image
        run: docker build -t my-python-app .

  test:
   needs: deploy
   runs-on: ubuntu-latest

   steps:
      - name: Test Docker image 
        run: echo "Docker image built successfully" 

      

      
      
