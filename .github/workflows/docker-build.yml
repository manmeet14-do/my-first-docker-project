name: Docker CI pipline


on:
  workflow_disptach:


jobs:
  build:
   runs-on: ubuntu-latest
 
   steps:
     - name: checkout code repo
       uses: actions/checkout@v4

     - name: verify Files 
       run: ls -la

     - name: upload artifacts
       uses: actions/upload-artifact@v4

  deploy:
   needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          - name: project-files
   

      - name: Build Docker images
        uses: docker build -t my-python-app .


      - name: save docker image
        run: docker save my-python-app -o my-python-app.tar


      - name: Upload Artifacts docker image
        uses: actions/upload-artifact@v4
        with: 
          - name: docker image
            path: my-python-app.tar

  test:
    needs: deploy
     runs-on: ubuntu-latest

     steps:
       - name: download artifacts
         uses: actions/download-artifact@v4
         with:
           name: docker-image
 

       - name: load docker Image
         run: docker load -i my-python-app.tar
        

       - name: verify docker images 
         run: docker images
 

       - name: Run docker container
         run: docker run --rm my-python-app
     
     
